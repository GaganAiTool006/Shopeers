<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopeers — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6FA;
    --surface:#FFFFFF;
    --line:#EAEBF0;
    --line-soft:#F1F2F6;
    --blue:#3B5BF5;
    --blue-light:#EEF1FE;
    --blue-dark:#2740C4;
    --green:#1FA45A;
    --green-light:#E9F8EF;
    --red:#E5484D;
    --red-light:#FDECED;
    --amber:#F2A93B;
    --amber-light:#FDF3E2;
    --purple:#8B5CF6;
    --text:#15172B;
    --text-dim:#6B6F87;
    --text-faint:#9B9EB0;
    --radius:14px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; font-size:14px;}
  a{text-decoration:none; color:inherit;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  img{max-width:100%; display:block;}
  ul{list-style:none;}

  .app{display:flex; min-height:100vh;}

  /* ===== Sidebar ===== */
  .sidebar{
    width:240px; background:var(--surface); border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:20px 14px; flex-shrink:0;
    position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .sb-brand{display:flex; align-items:center; justify-content:space-between; padding:0 8px 22px;}
  .sb-brand .logo{display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px;}
  .sb-brand .logo .mark{width:26px;height:26px; border-radius:7px; background:linear-gradient(135deg,var(--blue),var(--purple)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px;}
  .sb-collapse{width:26px;height:26px; border:1px solid var(--line); border-radius:7px; display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:11px;}

  .nav-section{margin-bottom:4px;}
  .nav-item{
    display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:9px; font-size:13.5px; color:var(--text-dim); font-weight:500;
    margin-bottom:1px; position:relative; transition:background .15s, color .15s;
  }
  .nav-item .ic{width:17px; text-align:center; font-size:14px; flex-shrink:0;}
  .nav-item:hover{background:var(--line-soft); color:var(--text);}
  .nav-item.active{background:var(--blue-light); color:var(--blue-dark); font-weight:600;}
  .nav-item.active::before{content:''; position:absolute; left:-14px; top:8px; bottom:8px; width:3px; background:var(--blue); border-radius:0 3px 3px 0;}
  .nav-item .count{margin-left:auto; background:var(--line-soft); color:var(--text-dim); font-size:11px; font-weight:600; padding:1px 7px; border-radius:20px;}
  .nav-item.active .count{background:var(--blue); color:#fff;}
  .nav-item .chev{margin-left:auto; font-size:10px; transition:transform .2s;}
  .nav-item .chev.open{transform:rotate(90deg);}
  .nav-divider{height:1px; background:var(--line); margin:12px 4px;}
  .nav-sub{padding-left:30px; max-height:0; overflow:hidden; transition:max-height .25s ease;}
  .nav-sub.open{max-height:200px;}
  .nav-sub .nav-item{font-size:13px; padding:7px 10px;}

  .sb-bottom{margin-top:auto;}
  .premium-card{
    background:linear-gradient(155deg, var(--blue-dark), var(--blue) 60%, var(--purple) 130%);
    border-radius:var(--radius); padding:16px; color:#fff; margin-top:16px;
  }
  .premium-card .pc-icon{width:30px;height:30px; border-radius:8px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; margin-bottom:10px;}
  .premium-card h4{font-size:13px; margin-bottom:4px;}
  .premium-card p{font-size:11.5px; opacity:.85; margin-bottom:12px; line-height:1.4;}
  .premium-card button{background:#fff; color:var(--blue-dark); font-size:12px; font-weight:700; padding:8px; border-radius:8px; width:100%;}

  /* ===== Topbar ===== */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    display:flex; align-items:center; gap:16px; padding:14px 28px; background:var(--surface);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
  }
  .search-box{
    flex:1; max-width:380px; display:flex; align-items:center; gap:8px; background:var(--bg);
    border:1px solid var(--line); border-radius:9px; padding:8px 12px; color:var(--text-faint); font-size:13px;
  }
  .search-box input{border:none; background:none; outline:none; flex:1; font-size:13px; color:var(--text);}
  .search-box kbd{font-size:11px; border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--text-faint);}
  .top-actions{display:flex; align-items:center; gap:14px; margin-left:auto;}
  .icon-btn{width:34px;height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--text-dim); border:1px solid transparent; transition:background .15s;}
  .icon-btn:hover{background:var(--line-soft);}
  .topbar .avatar{width:34px;height:34px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;}

  .content{padding:26px 28px; flex:1;}
  .page-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
  .page-head h1{font-size:25px; font-weight:700;}
  .head-actions{display:flex; align-items:center; gap:10px;}
  .pill-btn{display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--line); padding:8px 13px; border-radius:9px; font-size:13px; font-weight:500; color:var(--text-dim); transition:border-color .15s;}
  .pill-btn:hover{border-color:var(--blue);}
  .btn-primary{background:var(--blue); color:#fff; padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; transition:background .15s, transform .15s;}
  .btn-primary:hover{background:var(--blue-dark); transform:translateY(-1px);}
  .btn-outline{background:var(--surface); border:1px solid var(--line); padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600; color:var(--text);}

  /* ===== Cards / grid ===== */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:18px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; transition:transform .2s, box-shadow .2s;}
  .stat-card:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(21,23,43,.06);}
  .stat-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; color:var(--text-dim); font-size:13px; font-weight:500;}
  .stat-top .ic{color:var(--blue); font-size:15px;}
  .stat-num{font-size:26px; font-weight:700; display:flex; align-items:baseline; gap:8px; margin-bottom:4px;}
  .delta{font-size:11.5px; font-weight:700; padding:2px 7px; border-radius:6px;}
  .delta.up{color:var(--green); background:var(--green-light);}
  .delta.down{color:var(--red); background:var(--red-light);}
  .stat-sub{font-size:12px; color:var(--text-faint);}

  .dash-grid{display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .panel-head h3{font-size:14.5px; font-weight:700;}
  .panel-head .ic{color:var(--text-faint); font-size:13px; cursor:pointer;}

  .chart-row{display:flex; gap:28px; align-items:flex-end;}
  .profit-num{font-size:30px; font-weight:700; margin:4px 0 6px;}

  .seg-bar{display:flex; height:8px; border-radius:6px; overflow:hidden; margin-top:14px; gap:2px;}
  .seg-bar span{height:100%;}
  .seg-row{display:flex; justify-content:space-between; margin-top:14px;}
  .seg-item{display:flex; align-items:center; gap:8px; font-size:12.5px;}
  .seg-item .dot{width:7px;height:7px;border-radius:50%;}
  .seg-item .v{font-weight:700; font-size:14px; display:block;}
  .seg-item .l{color:var(--text-faint); font-size:11.5px;}

  .bars{display:flex; align-items:flex-end; gap:14px; height:120px; margin-top:10px;}
  .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;}
  .bar{width:100%; border-radius:6px 6px 3px 3px; background:var(--line-soft); transition:background .2s;}
  .bar.peak{background:var(--blue);}
  .bar-col .lbl{font-size:11.5px; color:var(--text-faint);}
  .bar-col.active .lbl{color:var(--text); font-weight:700;}

  .gauge-wrap{display:flex; flex-direction:column; align-items:center; padding:6px 0;}
  .gauge-num{font-size:26px; font-weight:700; margin-top:-58px;}
  .gauge-sub{font-size:11.5px; color:var(--text-faint); margin-top:4px; margin-bottom:14px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--text-faint); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; padding:9px 10px; border-bottom:1px solid var(--line);}
  td{padding:13px 10px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .prod-cell{display:flex; align-items:center; gap:10px;}
  .prod-thumb{width:34px;height:34px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--line-soft);}
  .rev-up{color:var(--green); font-weight:600;}
  .rev-down{color:var(--red); font-weight:600;}
  .star{color:var(--amber);}
  .badge{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; display:inline-block;}
  .badge.green{background:var(--green-light); color:var(--green);}
  .badge.red{background:var(--red-light); color:var(--red);}
  .badge.amber{background:var(--amber-light); color:var(--amber);}
  .badge.grey{background:var(--line-soft); color:var(--text-dim);}
  .badge.blue{background:var(--blue-light); color:var(--blue-dark);}

  .ai-box{display:flex; flex-direction:column; align-items:center; padding:10px 0 4px;}
  .ai-orb{width:60px;height:60px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #7C9CFF, var(--blue) 70%); margin:18px 0 22px; box-shadow:0 8px 24px rgba(59,91,245,.35); animation:floatOrb 3s ease-in-out infinite;}
  @keyframes floatOrb{0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}}
  .ai-input{display:flex; align-items:center; gap:8px; width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 12px; background:var(--bg);}
  .ai-input input{flex:1; border:none; background:none; outline:none; font-size:13px;}
  .ai-send{width:26px;height:26px; border-radius:50%; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px;}

  /* ===== Generic page layouts ===== */
  .toolbar{display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .toolbar .search-box{max-width:260px;}
  .tab-row{display:flex; gap:4px; background:var(--line-soft); padding:4px; border-radius:9px; width:fit-content; margin-bottom:18px;}
  .tab-row button{padding:7px 14px; border-radius:7px; font-size:12.5px; font-weight:600; color:var(--text-dim);}
  .tab-row button.active{background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08);}

  .product-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
  .product-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; transition:transform .2s, box-shadow .2s;}
  .product-card:hover{transform:translateY(-3px); box-shadow:0 12px 26px rgba(21,23,43,.08);}
  .product-card img{width:100%; height:120px; object-fit:cover;}
  .product-card .pc-body{padding:13px;}
  .product-card .pc-name{font-size:13px; font-weight:600; margin-bottom:4px;}
  .product-card .pc-meta{font-size:11.5px; color:var(--text-faint); display:flex; justify-content:space-between;}

  .settings-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px;}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
  .field label{font-size:12px; font-weight:600; color:var(--text-dim);}
  .field input, .field select, .field textarea{padding:9px 12px; border:1px solid var(--line); border-radius:8px; font-size:13px; color:var(--text); background:var(--surface);}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line-soft);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle{width:38px; height:21px; background:var(--line); border-radius:20px; position:relative; transition:background .2s; flex-shrink:0;}
  .toggle.on{background:var(--blue);}
  .toggle::after{content:''; width:17px;height:17px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on::after{left:19px;}

  .faq-item{border:1px solid var(--line); border-radius:var(--radius-sm); padding:15px; margin-bottom:10px; cursor:pointer;}
  .faq-item .q{font-weight:600; font-size:13.5px; display:flex; justify-content:space-between;}
  .faq-item .a{font-size:12.5px; color:var(--text-dim); margin-top:8px; display:none;}
  .faq-item.open .a{display:block;}

  .discount-code{font-family:monospace; background:var(--blue-light); color:var(--blue-dark); padding:3px 8px; border-radius:6px; font-size:12px; font-weight:700;}

  .empty-hint{font-size:12px; color:var(--text-faint); padding:30px; text-align:center;}

  .hidden{display:none !important;}

  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  .content{animation:fadeIn .3s ease;}

  @media(max-width:1100px){
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr;}
    .product-grid{grid-template-columns:repeat(2,1fr);}
    .settings-grid{grid-template-columns:1fr;}
  }
  @media(max-width:760px){
    .sidebar{position:fixed; left:-260px; z-index:100; transition:left .25s; box-shadow:0 0 0 9999px rgba(0,0,0,0);}
    .sidebar.open{left:0; box-shadow:10px 0 30px rgba(0,0,0,.15);}
    .topbar{padding:12px 16px;}
    .search-box{display:none;}
    .content{padding:18px 16px;}
    .stat-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
    .product-grid{grid-template-columns:1fr 1fr;}
    .page-head h1{font-size:20px;}
    .mobile-menu-btn{display:flex !important;}
  }
  .mobile-menu-btn{display:none; width:34px;height:34px; align-items:center; justify-content:center; border:1px solid var(--line); border-radius:8px; margin-right:4px;}
</style>
</head>

function profitChartSVG(){
  const pts = [20,35,30,50,42,60,55,70,58,48,40,52,46];
  const w=560, h=120, max=Math.max(...pts), min=Math.min(...pts);
  const stepX = w/(pts.length-1);
  const toY = v => h - ((v-min)/(max-min))*h*0.85 - 8;
  const path = pts.map((v,i)=>`${i===0?'M':'L'} ${i*stepX} ${toY(v)}`).join(' ');
  const area = path + ` L ${w} ${h} L 0 ${h} Z`;
  return `
  <svg viewBox="0 0 ${w} ${h+18}" width="100%" height="160" preserveAspectRatio="none">
    <defs><linearGradient id="profitGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B5BF5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B5BF5" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#profitGrad)"/>
    <path d="${path}" fill="none" stroke="#3B5BF5" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${5*stepX}" cy="${toY(pts[5])}" r="4" fill="#3B5BF5"/>
    <line x1="${5*stepX}" y1="0" x2="${5*stepX}" y2="${h}" stroke="#3B5BF5" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  </svg>
  <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-faint); margin-top:4px;">
    <span>1 Jan</span><span>8 Jan</span><span>15 Jan</span><span>22 Jan</span><span>29 Jan</span>
  </div>`;
}

function gaugeSVG(pct){
  const r=70, cx=90, cy=90, segs=28, startAngle=-180, endAngle=0;
  let arcs='';
  for(let i=0;i<segs;i++){
    const a = startAngle + (i/(segs-1))*(endAngle-startAngle);
    const rad = a*Math.PI/180;
    const x1 = cx + (r-9)*Math.cos(rad), y1 = cy + (r-9)*Math.sin(rad);
    const x2 = cx + r*Math.cos(rad), y2 = cy + r*Math.sin(rad);
    const filled = i/segs <= pct/100;
    arcs += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${filled?'#1FA45A':'#EAEBF0'}" stroke-width="5" stroke-linecap="round"/>`;
  }
  return `<svg viewBox="0 0 180 100" width="180" height="100">${arcs}</svg>`;
}
